<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js オリジナルマーカー課題</title>
    <!-- A-Frame ライブラリ -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <!-- AR.js ライブラリ -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- ARシーン定義（背面カメラ優先設定） -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; facingMode: environment;">
        
        <!-- アセット（素材）の事前読み込み -->
        <a-assets>
            <!-- 浮かび上がらせるキャラクター画像（大文字小文字に注意） -->
            <img id="char" src="character.PNG">
        </a-assets>

        <!-- 
            自作した .patt マーカーの指定 
            type="pattern" にし、urlにファイル名を指定します
        -->
        <a-marker type="pattern" url="pattern-marker.patt">
    <!-- 画像ではなく、まずは3Dの箱が出るかテスト -->
    <a-box position="0 0.5 0" material="color: red;"></a-box>
</a-marker>

        <!-- カメラの定義 -->
        <a-entity camera></a-entity>
        
    </a-scene>

</body>
</html>
